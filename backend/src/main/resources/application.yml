spring:
  application:
    name: pios-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pios}
    username: ${SPRING_DATASOURCE_USERNAME:pios}
    password: ${SPRING_DATASOURCE_PASSWORD:pios123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:pios-jwt-secret-key-2026-change-in-production}
  expiration: 86400000

neo4j:
  uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
  username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
  password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:pios1234}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

garmin:
  python:
    script-path: scripts/garmin_sync.py
    timeout-seconds: 120

sync:
  rate-limit-seconds: 30
  chunk-days: 30
  default-full-sync-months: 12
  schedule:
    cron: "0 0 3 * * *"

logging:
  level:
    com.pios: INFO
    org.springframework.security: INFO
