services:
  postgres:
    image: ankane/pgvector:latest
    container_name: pios-postgres
    environment:
      POSTGRES_USER: pios
      POSTGRES_PASSWORD: pios123
      POSTGRES_DB: pios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pios-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pios -d pios"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pios-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pios
      SPRING_DATASOURCE_USERNAME: pios
      SPRING_DATASOURCE_PASSWORD: pios123
      SPRING_NEO4J_URI: ${NEO4J_URI:-}
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME:-}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD:-}
      JWT_SECRET: pios-jwt-secret-key-2026-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pios-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pios-frontend
    depends_on:
      - backend
    networks:
      - pios-network
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: pios-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - pios-network
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  pios-network:
    driver: bridge
