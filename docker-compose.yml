services:
  postgres:
    image: ankane/pgvector:latest
    container_name: pios-postgres
    environment:
      POSTGRES_USER: pios
      POSTGRES_PASSWORD: pios123
      POSTGRES_DB: pios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pios-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pios -d pios"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: pios-neo4j
    environment:
      NEO4J_AUTH: neo4j/pios1234
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - pios-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "pios1234", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pios-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pios
      SPRING_DATASOURCE_USERNAME: pios
      SPRING_DATASOURCE_PASSWORD: pios123
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: pios1234
      JWT_SECRET: pios-jwt-secret-key-2026-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - pios-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pios-frontend
    depends_on:
      - backend
    networks:
      - pios-network
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: pios-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - pios-network
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  caddy_data:
  caddy_config:

networks:
  pios-network:
    driver: bridge
